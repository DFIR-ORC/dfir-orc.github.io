name: CI

on:
  push:
    branches:
      - 'release/*'
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required: sphinx-multiversion checks out every branch

      - name: Install dependencies
        shell: pwsh
        # sphinx<7.0 required for compatibility with sphinx-multiversion 0.2.4
        # (sphinx 7+ changed Config.read() signature, breaking sphinx-multiversion)
        run: pip install "sphinx<7.0" solar-theme sphinx-multiversion

      # Builds one sub-folder per branch matching conf.py whitelist
      - name: Build versioned HTML
        shell: pwsh
        run: sphinx-multiversion source .\build\html

      # Single-file build is version-agnostic: built from current checkout only
      - name: Build singlehtml
        shell: pwsh
        run: .\make.bat singlehtml

      # Root index.html for the artifact: redirects to /latest/
      # Note: the live gh-pages index.html is generated dynamically in the publish step.
      - name: Write root redirect page
        shell: pwsh
        run: Copy-Item -Force .\source\_static\root_redirect.html .\build\html\index.html

      - name: Upload html artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfir-orc-doc.zip
          path: .\build\html

      - name: Upload singlehtml artifact
        uses: actions/upload-artifact@v4
        with:
          name: dfir-orc-doc-singlehtml.zip
          path: .\build\singlehtml

      - name: Publish versioned pages
        if: startsWith(github.ref, 'refs/heads/release/')
        shell: pwsh
        run: |
          git config --global user.name  "GitHub Actions"
          git config --global user.email "actions@github.com"

          git fetch origin

          # Switch to gh-pages, isolated from source tree
          git checkout gh-pages

          # GitHub Pages is configured to serve from the docs/ subdirectory.
          # Ensure it exists.
          New-Item -Force -ItemType Directory -Path docs | Out-Null

          # Remove stale root-level artefacts written by old CI runs (not served by GH Pages)
          @('index.html', 'versions.html', '.nojekyll', 'release') | ForEach-Object {
            if (Test-Path $_) { Remove-Item -Recurse -Force $_ }
          }

          # Remove legacy flat files inside docs/ from the old single-version build.
          # Directory entries (e.g. release/) are managed selectively below.
          Get-ChildItem -Path docs -File | Remove-Item -Force
          $newDirs = Get-ChildItem -Directory .\build\html | Select-Object -ExpandProperty Name
          Get-ChildItem -Path docs -Directory |
            Where-Object { $_.Name -notin $newDirs } |
            ForEach-Object { Remove-Item -Recurse -Force $_.FullName }

          # Copy each versioned folder into docs/ (overwrites existing, keeps others intact)
          Get-ChildItem -Directory .\build\html | ForEach-Object {
            $dest = Join-Path 'docs' $_.Name
            if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
            Copy-Item -Recurse -Force $_.FullName $dest
          }

          # Remove untracked build/ directory to avoid polluting gh-pages
          if (Test-Path .\build) { Remove-Item -Recurse -Force .\build }

          # Sort releases descending by (major, minor) for both redirect and version listing
          $sortedReleases = if (Test-Path 'docs\release') {
            Get-ChildItem -Directory 'docs\release' |
              Sort-Object { $n = $_.Name -split '\.'; [int]$n[0] * 10000 + [int]$n[1] } -Descending
          } else { @() }

          # Determine the latest release version for the redirect
          $latestVer = $sortedReleases | Select-Object -First 1 -ExpandProperty Name
          $redirectTarget = if ($latestVer) { "release/$latestVer/index.html" } else { "versions.html" }

          # Generate docs/index.html that redirects to the latest release
          $rootHtml = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Redirecting to latest documentation</title><meta http-equiv='refresh' content='0; url=$redirectTarget'><link rel='canonical' href='$redirectTarget'></head><body><p>Redirecting to <a href='$redirectTarget'>latest documentation</a>.</p></body></html>"
          Set-Content -Path 'docs\index.html' -Value $rootHtml -Encoding UTF8

          # Generate docs/versions.html listing all published releases
          $versionItems = ''
          $sortedReleases | ForEach-Object {
            $ver = $_.Name
            $label = if ($ver -eq $latestVer) { "$ver (latest)" } else { $ver }
            $versionItems += "<li><a href='release/$ver/index.html'>$label</a></li>"
          }
          $versionsHtml = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>DFIR ORC Documentation - All Versions</title><style>body{font-family:sans-serif;max-width:600px;margin:2em auto}li{margin:.5em 0;list-style:none}a{font-size:1.1em}</style></head><body><h1>DFIR ORC Documentation</h1><p>Select a version:</p><ul>$versionItems</ul><p><a href='$redirectTarget'>Go to latest</a></p></body></html>"
          Set-Content -Path 'docs\versions.html' -Value $versionsHtml -Encoding UTF8

          # Disable Jekyll so GitHub Pages serves Sphinx _static/_sources folders
          New-Item -Force -ItemType File -Path 'docs\.nojekyll' | Out-Null

          git add --all
          git status

          # Skip commit if nothing changed
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "Docs update: $env:GITHUB_REF ($env:GITHUB_SHA)"
            git push "https://${{ secrets.GITHUB_TOKEN }}@github.com/DFIR-ORC/dfir-orc.github.io.git" gh-pages
          } else {
            Write-Host "No documentation changes to publish."
          }
